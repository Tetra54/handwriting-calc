<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Handwritten Math Solver</title>

<!-- MyScript iink -->
<script src="https://unpkg.com/myscript/dist/iink.min.js"></script>

<!-- Math.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

#editor {
  height: 300px;
  border: 2px solid black;
  margin: 20px;
  background: white;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  margin: 10px;
}

#output {
  font-size: 20px;
}
</style>
</head>

<body>

<h2>✍️ Handwritten Math Solver</h2>

<div id="editor"></div>

<button onclick="solve()">Solve</button>
<button onclick="clearInk()">Clear</button>

<h3 id="output">Draw something like 2 + 1</h3>

<script>
let editor;

// ✅ INIT EDITOR PROPERLY
async function init() {
  editor = await iink.register(document.getElementById("editor"), {
    recognitionParams: {
      type: "MATH",
      protocol: "REST",
      apiVersion: "V4",
      server: {
        applicationKey: "YOUR_APPLICATION_KEY",
        hmacKey: "YOUR_HMAC_KEY"
      }
    }
  });
}

init();

// CLEAR
function clearInk() {
  if (editor) editor.clear();
}

// SOLVE
function solve() {
  if (!editor) return;

  editor.getContent().then(result => {
    try {
      let expression = result["text/plain"];

      if (!expression) {
        document.getElementById("output").innerText = "No input detected";
        return;
      }

      let answer = math.evaluate(expression);

      document.getElementById("output").innerText =
        expression + " = " + answer;

    } catch (e) {
      document.getElementById("output").innerText = "Invalid expression";
    }
  });
}
</script>

</body>
</html>
