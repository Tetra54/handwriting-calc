
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Math Solver</title>
  <script type="module" src="https://unpkg.com/myscript-math-web@2.1.0/myscript-math-web.js"></script>
  <style>
    body { margin: 0; background: #1a1a1a; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 10px; text-align: center; background: #2d2d2d; color: white; font-size: 14px; }
    
    /* THE FIX: Added touch-action and specific height */
    myscript-math-web {
      flex-grow: 1;
      width: 100%;
      height: 75vh; 
      background: #ffffff;
      touch-action: none; 
      --myscript-math-web-line-color: #1A73E8;
    }

    .toolbar { padding: 20px; display: flex; justify-content: center; gap: 20px; background: #1a1a1a; }
    button { padding: 15px 40px; font-size: 18px; border-radius: 10px; border: none; font-weight: bold; color: white; }
    .clear { background: #5f6368; }
    .solve { background: #34a853; }
  </style>
</head>
<body>
  <header>AI HANDWRITING CALCULATOR</header>

  <myscript-math-web 
    id="widget"
    applicationkey="601cba55-236d-47fd-899b-b4892faae6fd"
    hmackey="f7da3ed8-7e93-452b-ba1e-1a6f18248422">
  </myscript-math-web>

  <div class="toolbar">
    <button class="clear" onclick="document.getElementById('widget').clear()">CLEAR</button>
    <button class="solve" onclick="document.getElementById('widget').convert()">SOLVE</button>
  </div>
</body>
</html>
