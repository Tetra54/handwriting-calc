<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Solver</title>
    <script src="https://unpkg.com/@myscript/math-web@2.1.0/dist/myscript-math-web.js"></script>
    <style>
        body { margin: 0; background: #222; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #wrapper { flex-grow: 1; background: white; touch-action: none; }
        myscript-math-web { width: 100%; height: 100%; display: block; }
        .bot { padding: 20px; display: flex; gap: 10px; justify-content: center; background: #222; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="wrapper">
        <myscript-math-web 
            id="widget"
            applicationkey="601cba55-236d-47fd-899b-b4892faae6fd"
            hmackey="f7da3ed8-7e93-452b-ba1e-1a6f18248422">
        </myscript-math-web>
    </div>
    <div class="bot">
        <button style="background:#444; color:white" onclick="document.getElementById('widget').clear()">CLEAR</button>
        <button style="background:#28a745; color:white" onclick="document.getElementById('widget').convert()">SOLVE</button>
    </div>
</body>
</html>
