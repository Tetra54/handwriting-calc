<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Handwritten Math Solver</title>

  <!-- MyScript iink -->
  <script src="https://unpkg.com/iink-js@latest/dist/iink.min.js"></script>

  <!-- Math.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    #editor {
      width: 600px;
      height: 300px;
      border: 2px solid black;
      margin: 20px auto;
      background: white;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
    }

    #output {
      font-size: 20px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>✍️ Handwritten Math Solver</h2>

<div id="editor"></div>

<button onclick="solve()">Solve</button>
<button onclick="clearInk()">Clear</button>

<div id="output"></div>

<script>
let editor;

window.addEventListener("load", () => {

  editor = iink.register(document.getElementById("editor"), {
    recognitionParams: {
      type: "MATH",
      server: {
        applicationKey: "4747c24f-95e3-492e-83e6-d0b9cd24f6da",
        hmacKey: "501a3333-33f4-487d-adb5-ea0bbe643ac2"
      }
    }
  });

});

function solve() {
  editor.export_().then(result => {
    console.log(result);

    const expr = result["text/plain"];

    if (!expr) {
      document.getElementById("output").innerText = "Nothing detected";
      return;
    }

    try {
      const answer = math.evaluate(expr);
      document.getElementById("output").innerText = expr + " = " + answer;
    } catch {
      document.getElementById("output").innerText = "Invalid expression";
    }
  });
}

function clearInk() {
  editor.clear();
  document.getElementById("output").innerText = "";
}
</script>

</body>
</html>
