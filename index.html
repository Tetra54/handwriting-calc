<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Handwritten Math Solver</title>

  <!-- MyScript SDK -->
  <script src="https://unpkg.com/myscript"></script>

  <!-- Math.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    #editor {
      height: 300px;
      border: 2px solid black;
      margin: 20px;
      background: white;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
    }
  </style>
</head>

<body>

  <h2>✍️ Handwritten Math Solver</h2>

  <div id="editor"></div>

  <button onclick="solve()">Solve</button>

  <h3 id="output">Draw something like 2 + 1</h3>

  <script>
    const editor = MyScript.register({
      element: document.getElementById('editor'),
      recognitionParams: {
        type: 'MATH'
      },
      server: {
        applicationKey: "46716306-113a-4c3e-a4b8-05d08eb034b4",
        hmacKey: "7feecad2-c0d6-4265-b2c1-ce4422fa0a18"
      }
    });

    function solve() {
      editor.getContent().then(result => {
        console.log(result); // debug

        try {
          let expression = result["text/plain"];

          if (!expression) {
            document.getElementById("output").innerText = "No input detected";
            return;
          }

          let answer = math.evaluate(expression);

          document.getElementById("output").innerText =
            expression + " = " + answer;

        } catch (e) {
          document.getElementById("output").innerText = "Invalid expression";
        }
      });
    }
  </script>

</body>
</html>
