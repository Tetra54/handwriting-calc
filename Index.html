<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Handwriting Solver</title>
  
  <script type="module" src="https://unpkg.com/myscript-math-web@2.1.0/myscript-math-web.js"></script>

  <style>
    body { margin: 0; background: #1a1a1a; font-family: sans-serif; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 15px; text-align: center; background: #333; font-weight: bold; border-bottom: 1px solid #444; }
    
    myscript-math-web {
      flex-grow: 1;
      width: 100vw;
      background: #ffffff;
      --myscript-math-web-line-color: #1A73E8;
    }

    .toolbar {
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #1a1a1a;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .clear { background: #5f6368; color: white; }
    .solve { background: #34a853; color: white; }
  </style>
</head>
<body>

  <header>AI MATH CALCULATOR</header>

  <myscript-math-web 
    id="widget"
    applicationkey="PASTE_YOUR_APP_KEY_HERE"
    hmackey="PASTE_YOUR_HMAC_KEY_HERE">
  </myscript-math-web>

  <div class="toolbar">
    <button class="clear" onclick="document.getElementById('widget').clear()">CLEAR</button>
    <button class="solve" onclick="document.getElementById('widget').convert()">SOLVE</button>
  </div>

</body>
</html>
